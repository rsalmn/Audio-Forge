<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Forge | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- Ambient Background -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon-wrap">
                    <i data-lucide="audio-lines"></i>
                </div>
                <h1>Audio Forge</h1>
                <p class="login-sub">Sign in to continue</p>
            </div>

            <form id="login-form" class="login-form" autocomplete="off">
                <div class="form-field">
                    <label for="login-user"><i data-lucide="user"></i> Username</label>
                    <input type="text" id="login-user" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-field">
                    <label for="login-pass"><i data-lucide="lock"></i> Password</label>
                    <div class="password-wrap">
                        <input type="password" id="login-pass" placeholder="Enter your password" required>
                        <button type="button" class="toggle-pass" id="toggle-pass" tabindex="-1">
                            <i data-lucide="eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <div id="login-error" class="login-error hidden"></div>

                <button type="submit" class="btn-login" id="btn-login">
                    <span id="login-btn-text">Sign In</span>
                    <div class="btn-loader hidden" id="btn-loader"></div>
                </button>
            </form>

            <div class="login-footer">
                <span>Audio Forge v2.0 — Premium Audio Editor</span>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
